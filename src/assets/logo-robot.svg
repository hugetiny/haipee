<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Antenna -->
  <line x1="50" y1="14" x2="50" y2="22" stroke="#A78BFA" stroke-width="3" stroke-linecap="round"/>
  <circle cx="50" cy="10" r="4" fill="#A78BFA"/>

  <!-- Head -->
  <rect x="22" y="22" width="56" height="40" rx="12" fill="#1E1B4B" stroke="#7C3AED" stroke-width="2"/>

  <!-- Eyes -->
  <!-- Left eye socket -->
  <rect x="30" y="32" width="16" height="14" rx="5" fill="#0F0A2A"/>
  <!-- Left eye glow -->
  <circle cx="38" cy="39" r="5" fill="#8B5CF6"/>
  <circle cx="38" cy="39" r="2.5" fill="#C4B5FD"/>
  <circle cx="40" cy="37" r="1" fill="white" opacity="0.7"/>

  <!-- Right eye socket -->
  <rect x="54" y="32" width="16" height="14" rx="5" fill="#0F0A2A"/>
  <!-- Right eye glow -->
  <circle cx="62" cy="39" r="5" fill="#8B5CF6"/>
  <circle cx="62" cy="39" r="2.5" fill="#C4B5FD"/>
  <circle cx="64" cy="37" r="1" fill="white" opacity="0.7"/>

  <!-- Mouth / LED strip -->
  <rect x="35" y="52" width="30" height="5" rx="2.5" fill="#0F0A2A"/>
  <rect x="37" y="53.5" width="6" height="2" rx="1" fill="#34D399"/>
  <rect x="46" y="53.5" width="6" height="2" rx="1" fill="#34D399"/>
  <rect x="55" y="53.5" width="6" height="2" rx="1" fill="#34D399"/>

  <!-- Neck -->
  <rect x="44" y="62" width="12" height="6" rx="2" fill="#2D2369"/>

  <!-- Body -->
  <rect x="26" y="68" width="48" height="24" rx="10" fill="#1E1B4B" stroke="#7C3AED" stroke-width="2"/>
  <!-- Chest panel -->
  <rect x="36" y="74" width="28" height="12" rx="5" fill="#0F0A2A"/>
  <!-- Chest LEDs -->
  <circle cx="44" cy="80" r="3" fill="#A78BFA"/>
  <circle cx="50" cy="80" r="3" fill="#C4B5FD"/>
  <circle cx="56" cy="80" r="3" fill="#8B5CF6"/>

  <!-- Left arm -->
  <rect x="13" y="70" width="11" height="18" rx="5.5" fill="#1E1B4B" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="18.5" cy="88" r="4.5" fill="#2D2369" stroke="#7C3AED" stroke-width="1.5"/>

  <!-- Right arm -->
  <rect x="76" y="70" width="11" height="18" rx="5.5" fill="#1E1B4B" stroke="#7C3AED" stroke-width="2"/>
  <circle cx="81.5" cy="88" r="4.5" fill="#2D2369" stroke="#7C3AED" stroke-width="1.5"/>

  <!-- Legs -->
  <rect x="35" y="92" width="12" height="8" rx="4" fill="#1E1B4B" stroke="#7C3AED" stroke-width="2"/>
  <rect x="53" y="92" width="12" height="8" rx="4" fill="#1E1B4B" stroke="#7C3AED" stroke-width="2"/>
</svg>
