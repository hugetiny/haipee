# ============================================
# 格式定义（端点、认证、结构）
# ============================================

[formats.openai]
id = "openai"
name = "OpenAI"
description = "标准 OpenAI API 格式"
endpoint_path = "/v1/chat/completions"
auth_type = "bearer"
auth_header = "Authorization"
request_structure = "openai_chat"
response_structure = "openai_chat_response"
system_prompt_location = "messages[0].role=system"

[formats.anthropic]
id = "anthropic"
name = "Anthropic Messages"
description = "Claude Messages API 格式"
endpoint_path = "/v1/messages"
auth_type = "api_key"
auth_header = "x-api-key"
request_structure = "anthropic_messages"
response_structure = "anthropic_content"
system_prompt_location = "system"

[formats.gemini]
id = "gemini"
name = "Google Gemini"
description = "Gemini API 格式"
endpoint_path = "/v1beta/models/{model}:generateContent"
auth_type = "query_param"
auth_param = "key"
request_structure = "gemini_content"
response_structure = "gemini_candidates"
system_prompt_location = "systemInstruction.parts"

[formats.azure]
id = "azure"
name = "Azure OpenAI"
description = "Azure OpenAI Service 格式"
endpoint_path = "/openai/deployments/{deployment}/chat/completions"
auth_type = "api_key"
auth_header = "api-key"
request_structure = "openai_chat"
response_structure = "openai_chat_response"
system_prompt_location = "messages[0].role=system"

[formats.aliyun]
id = "aliyun"
name = "阿里云灵积"
description = "阿里云灵积原生格式"
endpoint_path = "/api/v1/services/aigc/text-generation/generation"
auth_type = "bearer"
auth_header = "Authorization"
request_structure = "aliyun_generation"
response_structure = "aliyun_output"
system_prompt_location = "input.messages"

[formats.baidu]
id = "baidu"
name = "百度文心"
description = "百度文心原生格式"
endpoint_path = "/rpc/2.0/ai_custom/v1/wenxinworkshop/chat/completions"
auth_type = "bearer"
auth_header = "Authorization"
request_structure = "baidu_chat"
response_structure = "baidu_result"
system_prompt_location = "system"

[formats.bytedance]
id = "bytedance"
name = "字节跳动"
description = "豆包大模型原生格式"
endpoint_path = "/api/v3/chat/completions"
auth_type = "bearer"
auth_header = "Authorization"
request_structure = "openai_chat"
response_structure = "openai_chat_response"
system_prompt_location = "messages[0].role=system"

[formats.opencode-zen]
id = "opencode-zen"
name = "OpenCode Zen"
description = "OpenCode Zen 原生优化格式"
endpoint_path = "/v2/zen/generate"
auth_type = "bearer"
auth_header = "Authorization"
request_structure = "zen_input"
response_structure = "zen_output"
system_prompt_location = "input.messages"
features = ["zen_mode", "context_compression", "cost_analysis"]

[formats.custom]
id = "custom"
name = "自定义"
description = "自定义 API 格式"
endpoint_path = "/"
auth_type = "bearer"
auth_header = "Authorization"
request_structure = "custom"
response_structure = "custom"
system_prompt_location = "custom"
